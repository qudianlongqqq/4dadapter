experiment_name: ecir_mvr_stage2b_run_b_conservative_torsion_seed42_5k
seed: 42

data:
  train_sources: data/ecir_mvr/stage_c/real_sources/train.parquet
  val_sources: data/ecir_mvr/stage_c/real_sources/val.parquet
  train_targets: data/ecir_mvr/stage_c/minimal_targets/train.parquet
  val_targets: data/ecir_mvr/stage_c/minimal_targets/val.parquet
  validity_statistics: data/ecir_mvr/validity_reference_stats.json
  train_molecules: 500
  val_molecules: 100
  train_epoch_size: 1000
  val_epoch_size: 400
  mixture: {real_error: 0.45, synthetic_error: 0.30, clean_identity: 0.25}
  synthetic_mixture:
    bond_only: 0.20
    angle_only: 0.20
    clash_only: 0.15
    ring_only: 0.15
    torsion_only: 0.15
    mixed: 0.15
  max_single_source_fraction: 0.30
  out_of_domain_extreme_fraction: 0.0

frozen_identities:
  stage_c_decision: PASS
  target_gate_identity_sha256: 6d73ccf9e1453134134ad27ba18bd3a1f8a2e76e49a72e0c464a7bd290f23ca7
  real_source_identity_sha256: e61f8eb7d29b1693688f6a1735bc5d1d5460ba99dec31702098c5eca9a6e7f7c
  validity_statistics_identity_sha256: 66dd6ab6cf290057d8dea725e0042ba5a5fcc69ad0ec9e0db8971910df377cd3

model:
  atom_feature_dim: 10
  edge_attr_dim: 1
  hidden_dim: 64
  edge_hidden_dim: 64
  time_embedding_dim: 32
  num_layers: 4
  encoder_num_layers: 3
  dropout: 0.0
  cutoff: 10.0
  error_embedding_dim: 24
  deterministic_feature_dim: 10
  rigid_scale: 1.0
  torsion_scale: 0.10
  high_flex_torsion_scale: 0.05
  torsion_gate_fixed_zero: false
  conservative_torsion_gate: true
  torsion_uncertainty_max: 1.0
  max_velocity_atom_norm: 0.12
  max_velocity_graph_rms: 0.06
  metadata_dropout: 0.5

run_b_mode:
  enable_rigid_modes: true
  enable_bond_repair: true
  enable_angle_repair: true
  enable_ring_repair: true
  enable_clash_repair: true
  enable_chirality_safety: true
  enable_torsion_repair: true
  torsion_gate_fixed_zero: false
  rigid_velocity_scale: 1.0
  torsion_velocity_scale: 0.10
  high_flex_torsion_scale: 0.05
  max_torsion_change_rad: 0.035
  max_high_flex_torsion_change_rad: 0.020
  torsion_prior_threshold: 4.0
  torsion_uncertainty_max: 1.0

loss:
  flow: 1.0
  validity: 0.25
  identity: 0.5
  anchor: 0.1
  sparse: 0.1
  torsion_anchor: 0.1
  error: 0.25
  uncertainty: 0.05
  trust: 0.1
  torsion_mode: 0.10
  torsion_gate_sparsity: 0.02
  high_flex_torsion_trust: 0.10

training:
  optimizer_steps: 5000
  batch_size: 8
  val_batch_size: 8
  num_workers: 0
  learning_rate: 0.0002
  weight_decay: 0.000001
  gradient_clip_norm: 1.0
  log_interval: 50
  validation_interval: 1000
  checkpoint_steps: [1000, 2000, 3000, 4000, 5000]
  teacher_steps: 4
  t_min: 0.0
  t_max: 1.0
  precision: float32

inference:
  teacher_steps: 4
  step_size: 0.25
  t_min: 0.0
  t_max: 1.0
  acceptance_mode: best_of_trajectory
  acceptance:
    max_torsion_change_rad: 0.035
    max_high_flex_torsion_change_rad: 0.020
    max_uncertainty: 1.0

noninferiority:
  rmsd_mean_delta_max: 0.015
  rmsd_ci_upper_max: 0.020
  mat_p_mean_delta_max: 0.015
  mat_p_ci_upper_max: 0.020
  mat_r_mean_delta_max: 0.015
  mat_r_ci_upper_max: 0.020
  cov_p_absolute_drop_max: 0.005
  cov_r_absolute_drop_max: 0.005
  clean_identity_fraction_min: 0.90

incremental_noninferiority:
  rmsd_mean_delta_max: 0.003
  rmsd_ci_upper_max: 0.005
  mat_p_mean_delta_max: 0.003
  mat_p_ci_upper_max: 0.005
  mat_r_mean_delta_max: 0.003
  mat_r_ci_upper_max: 0.005
  cov_absolute_drop_max: 0.0
  high_flex_rmsd_mean_delta_max: 0.003
  high_flex_rmsd_ci_upper_max: 0.005
  high_flex_mean_torsion_change_max: 0.010
  high_flex_p95_torsion_change_max: 0.030

run_a_checkpoint: logs_ecir_mvr/stage2b/run_a_rigid_only_seed42_5k/checkpoints/best_noninferior_validity.ckpt
run_a_checkpoint_sha256: ac3e7e3b1fa4189e8ccdfeb45ea7c799a7130c213aeed017c301218b71487070
output_dir: logs_ecir_mvr/stage2b/run_b_conservative_torsion_seed42_5k
diagnostics_dir: diagnostics/ecir_mvr/stage2b/run_b
