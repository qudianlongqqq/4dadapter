task_name: formal_large/global4d_seed42_200k
seed: 42

time_sampling:
  t_min: 0.0
  t_max: 0.25

data:
  cache_dir: data/flexbond_cache_formal_large
  batch_size: 4
  num_workers: 4
  max_molecules: null
  pin_memory: false
  validate_cache: true

model:
  motion_mode: global_coupled_4d_joint_deformation
  atom_feature_dim: 10
  edge_attr_dim: 1
  hidden_dim: 128
  edge_hidden_dim: 128
  time_embedding_dim: 64
  num_layers: 6
  dropout: 0.0
  cutoff: 10.0
  stretch_scale: 1.0
  angular_scale: 1.0
  projection_rank_tol: 0.000001
  target_rank_tol: 0.000001

loss:
  final_weight: 1.0
  internal_weight: 1.0
  residual_weight: 1.0
  coefficient_weight: 0.05

optimizer:
  lr: 0.0002
  weight_decay: 0.000001
  grad_clip: 1.0
  scheduler: none

trainer:
  max_steps: 200000
  accelerator: auto
  devices: 1
  precision: 32-true
  accumulate_grad_batches: 2
  val_check_interval: 5000
  check_val_every_n_epoch: null
  limit_val_batches: 100
  log_every_n_steps: 50

sampling:
  refinement_steps: 10
  update_scale: 0.5
  max_displacement: 0.1
  max_coordinate_norm: 1000.0
