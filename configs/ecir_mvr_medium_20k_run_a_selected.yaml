  torsion_gate_fixed_zero: true
  max_velocity_atom_norm: 0.12
  max_velocity_graph_rms: 0.06
  metadata_dropout: 0.5

run_a_mode:
  enable_rigid_modes: true
  enable_bond_repair: true
  enable_angle_repair: true
  enable_ring_repair: true
  enable_clash_repair: true
  enable_chirality_safety: true
  enable_torsion_repair: false
  torsion_gate_fixed_zero: true
  torsion_velocity_scale: 0.0
  retain_torsion_auxiliary: true
