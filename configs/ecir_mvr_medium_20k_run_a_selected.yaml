  rmsd_ci_upper_max: 0.020
  mat_p_mean_delta_max: 0.015
  mat_p_ci_upper_max: 0.020
  mat_r_mean_delta_max: 0.015
  mat_r_ci_upper_max: 0.020
  cov_p_absolute_drop_max: 0.005
