task_name: gated_global4d_v2/pilot_seed42_2k
seed: 42

time_sampling:
  t_min: 0.0
  t_max: 0.25

data:
  cache_dir: data/flexbond_cache_formal_large
  batch_size: 8
  num_workers: 4
  max_molecules: 2000
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  validate_cache: true

model:
  motion_mode: global_coupled_4d_joint_deformation
  atom_feature_dim: 10
  edge_attr_dim: 1
  hidden_dim: 128
  edge_hidden_dim: 128
  time_embedding_dim: 64
  num_layers: 6
  dropout: 0.0
  cutoff: 10.0
  stretch_scale: 1.0
  angular_scale: 1.0
  projection_rank_tol: 1.0e-6
  target_rank_tol: 1.0e-6
  joint_mode: full_4d
  fusion_mode: gated_additive
  internal_beta: 1.0
  gate_hidden_dim: 64
  gate_init_bias: -2.0
  gate_use_flexibility_features: true

loss:
  final_weight: 1.0
  cartesian_weight: 1.0
  internal_weight: 1.0
  residual_weight: 1.0
  coefficient_weight: 0.05
  gate_regularization_weight: 0.0001

optimizer:
  lr: 0.0002
  weight_decay: 0.000001
  grad_clip: 1.0
  scheduler: none

trainer:
  max_steps: 2000
  accelerator: auto
  devices: 1
  precision: 32-true
  accumulate_grad_batches: 1
  val_check_interval: 250
  check_val_every_n_epoch: null
  limit_val_batches: 25
  log_every_n_steps: 10

sampling:
  refinement_steps: 2
  update_scale: 0.5
  max_displacement: 0.1
  max_coordinate_norm: 1000.0
